applications:
    - appRoot: frontend
      customHeaders:
          - pattern: '**/*'
            headers:
                - key: Cache-Control
                  value: public, max-age=0, must-revalidate
          - pattern: '**/*.{js,css,woff2,png,jpg,svg,ico}'
            headers:
                - key: Cache-Control
                  value: public, max-age=31536000, immutable
